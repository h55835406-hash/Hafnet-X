<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAFNET X - OSINT TERMINAL</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; }
        .terminal-window { width: 80%; max-width: 900px; height: 80%; background: rgba(10, 10, 10, 0.9); border: 2px solid #0f0; box-shadow: 0 0 20px rgba(0, 255, 0, 0.5); display: flex; flex-direction: column; overflow: hidden; animation: fadeIn 1.5s ease-out; }
        .terminal-header { background: #0f0; color: #000; padding: 5px 10px; font-weight: bold; text-align: center; text-transform: uppercase; }
        .terminal-content { padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        h1 { text-align: center; color: #0f0; text-shadow: 0 0 10px #0f0; margin-top: 0; }
        .input-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        input { background: transparent; border: 1px solid #0f0; color: #0f0; padding: 10px; font-family: monospace; font-size: 1.1em; width: 60%; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; font-family: monospace; font-size: 1.1em; cursor: pointer; font-weight: bold; }
        #output { border-top: 1px solid #333; padding-top: 20px; flex-grow: 1; }
        .log-entry { margin-bottom: 10px; opacity: 0; animation: fadeInUp 0.5s forwards; }
        .log-error { color: #f00; }
        .log-success { color: #0ff; }
        .result-item { margin-left: 20px; border-left: 2px solid #333; padding-left: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <canvas id="matrix-bg"></canvas>
    <div class="terminal-window">
        <div class="terminal-header">HAFNET X - DATA ACCESS TERMINAL</div>
        <div class="terminal-content">
            <h1>HAFNET X</h1>
            <div class="input-group">
                <input type="text" id="phoneInput" placeholder="79991234567">
                <button onclick="startLookup()">SEARCH</button>
            </div>
            <div id="output"></div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const alphabet = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16; const columns = canvas.width / fontSize; const rainDrops = [];
        for(let x = 0; x < columns; x++) rainDrops[x] = 1;
        function draw() { ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#0F0'; ctx.font = fontSize + 'px monospace'; for(let i = 0; i < rainDrops.length; i++) { const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length)); ctx.fillText(text, i*fontSize, rainDrops[i]*fontSize); if(rainDrops[i]*fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0; rainDrops[i]++; } }
        setInterval(draw, 30);

        function log(text, type = '') { const entry = document.createElement('div'); entry.className = `log-entry ${type}`; entry.innerHTML = `> ${text}`; document.getElementById('output').appendChild(entry); }

        async function startLookup() {
            const phone = document.getElementById('phoneInput').value;
            const key = 'Num_live_nEWPrIT9AsvpoiPtebcy33PShlqxNWN6xs5gxHl5';
            document.getElementById('output').innerHTML = '';
            if(!phone) return log('ОШИБКА: Введите номер', 'log-error');
            log('Запуск поиска в базе HAFNET X...');
            try {
                const res = await fetch(`https://api.numlookupapi.com/v1/validate/${phone}?apikey=${key}`);
                const data = await res.json();
                if(data.valid) {
                    log('ДАННЫЕ ПОЛУЧЕНЫ:', 'log-success');
                    log(`<div class="result-item">СТРАНА: ${data.country_name}</div>`);
                    log(`<div class="result-item">ОПЕРАТОР: ${data.carrier}</div>`);
                    log(`<div class="result-item">ЛОКАЦИЯ: ${data.location}</div>`);
                } else { log('Номер не найден', 'log-error'); }
            } catch(e) { log('Ошибка шлюза', 'log-error'); }
        }
    </script>
</body>
</html>
